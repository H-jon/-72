name: Convert posters to PNG

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/convert-posters-to-png.yml'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --upgrade pillow

      - name: Convert WebP poster sprite to PNG
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          import re

          webp = Path('assets/posters.webp')
          png = Path('assets/posters.png')
          if not webp.exists():
              raise SystemExit('assets/posters.webp was not found')

          image = Image.open(webp).convert('RGB')
          image = image.quantize(colors=256, method=Image.Quantize.MEDIANCUT, dither=Image.Dither.FLOYDSTEINBERG)
          image.save(png, format='PNG', optimize=True)

          css_path = Path('assets/style.css')
          css = css_path.read_text(encoding='utf-8')
          css = css.replace('url("posters.webp")', 'url("posters.png?v=2")')
          css = css.replace("url('posters.webp')", "url('posters.png?v=2')")
          css = css.replace('url(posters.webp)', 'url(posters.png?v=2)')
          css_path.write_text(css, encoding='utf-8')

          for html_path in Path('.').glob('*.html'):
              html = html_path.read_text(encoding='utf-8')
              html = re.sub(r'assets/style\.css\?v=\d+', 'assets/style.css?v=12', html)
              html = re.sub(r'assets/app\.js\?v=\d+', 'assets/app.js?v=12', html)
              html_path.write_text(html, encoding='utf-8')

          readme = Path('README.md')
          if readme.exists():
              text = readme.read_text(encoding='utf-8')
              text = text.replace('WebP 이미지 스프라이트', 'PNG 이미지 스프라이트')
              text = text.replace('로컬 WebP 이미지', '로컬 PNG 이미지')
              readme.write_text(text, encoding='utf-8')

          webp.unlink()
          PY

      - name: Commit PNG poster fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/posters.png assets/style.css README.md *.html
          git rm -f assets/posters.webp
          git commit -m "Convert poster sprite to PNG and fix image loading"
          git push
